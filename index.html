<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praveen B.S. - AML Professional Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f4c75;
            --highlight: #3282b8;
            --text: #2d3436;
            --text-light: #636e72;
            --bg: #fafafa;
            --card: #ffffff;
            --border: #e1e8ed;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.6s ease-out;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        
        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            margin-top: 80px;
            min-height: 85vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 4rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 4rem 2rem;
        }
        
        .hero-content {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        .hero-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1.1;
            color: var(--primary);
            margin-bottom: 2rem;
            letter-spacing: -2px;
        }
        
        .hero h1 strong {
            font-weight: 700;
            display: block;
        }
        
        .hero-description {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 500px;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }
        
        .hero-cta {
            display: flex;
            gap: 1.5rem;
        }
        
        .btn {
            padding: 1rem 2.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--highlight);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(15, 76, 117, 0.2);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        
        .btn-secondary:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        
        .hero-visual {
            position: relative;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .profile-card {
            background: var(--card);
            padding: 3rem;
            border-radius: 2px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            position: relative;
        }
        
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent), var(--highlight));
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent);
            display: block;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Section Styling */
        section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }
        
        .section-header {
            margin-bottom: 4rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--primary);
            letter-spacing: -1px;
        }
        
        /* About Section */
        .about-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        
        .about-text {
            font-size: 1.1rem;
            color: var(--text);
            line-height: 1.9;
        }
        
        .about-text p {
            margin-bottom: 1.5rem;
        }
        
        .about-highlights {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }
        
        .highlight-item {
            margin-bottom: 2rem;
        }
        
        .highlight-item:last-child {
            margin-bottom: 0;
        }
        
        .highlight-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .highlight-value {
            color: var(--text-light);
            font-size: 0.95rem;
            word-break: break-word;
        }
        
        /* Experience Section */
        .experience-grid {
            display: grid;
            gap: 3rem;
        }
        
        .experience-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 3rem;
            padding: 2.5rem 0;
            border-bottom: 1px solid var(--border);
            animation: fadeInUp 0.6s ease-out;
        }
        
        .experience-item:last-child {
            border-bottom: none;
        }
        
        .experience-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: 600;
        }
        
        .experience-details h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .experience-company {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .experience-description {
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 1rem;
        }
        
        .experience-description ul {
            margin-top: 1rem;
            margin-left: 1.5rem;
        }
        
        .experience-description li {
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .experience-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }
        
        .tag {
            padding: 0.4rem 1rem;
            background: var(--bg);
            color: var(--accent);
            font-size: 0.85rem;
            border-radius: 20px;
            font-weight: 500;
        }
        
        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .skill-category {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            animation: fadeInUp 0.6s ease-out;
        }
        
        .skill-category h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        
        .skill-list {
            list-style: none;
        }
        
        .skill-item {
            margin-bottom: 1.2rem;
        }
        
        .skill-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }
        
        .skill-bar {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(to right, var(--accent), var(--highlight));
            border-radius: 10px;
            transition: width 1s ease-out;
        }
        
        /* Certifications Section */
        .certifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .certification-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .certification-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }
        
        .certification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--accent), var(--highlight));
        }
        
        .certification-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .certification-provider {
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .certification-year {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        /* Education Section */
        .education-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .education-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .education-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--accent), var(--highlight));
        }
        
        .education-degree {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .education-school {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        
        .education-year {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        
        .education-details {
            color: var(--text);
            line-height: 1.8;
        }
        
        /* Contact Section */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        
        .contact-info h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        
        .contact-methods {
            list-style: none;
        }
        
        .contact-method {
            margin-bottom: 2rem;
            display: flex;
            align-items: start;
            gap: 1rem;
        }
        
        .contact-icon {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
        }
        
        .contact-details {
            flex: 1;
        }
        
        .contact-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 0.3rem;
        }
        
        .contact-value {
            color: var(--text);
            font-size: 1.05rem;
            word-break: break-word;
        }
        
        .contact-value a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .contact-value a:hover {
            color: var(--highlight);
        }
        
        .contact-form {
            background: var(--card);
            padding: 3rem;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        /* Footer */
        footer {
            background: var(--primary);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .social-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 1.5rem;
        }
        
        .social-links a:hover {
            color: var(--highlight);
        }
        
        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 968px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .hero h1 {
                font-size: 3.5rem;
            }
            
            .hero-cta {
                justify-content: center;
            }
            
            .hero-description {
                margin-left: auto;
                margin-right: auto;
            }
            
            .about-content {
                grid-template-columns: 1fr;
            }
            
            .experience-item {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .contact-container {
                grid-template-columns: 1fr;
            }
            
            .nav-links {
                display: none;
            }
        }
        
        /* Scroll Animation */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        
        .scroll-reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">Praveen B.S.</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#certifications">Certifications</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
